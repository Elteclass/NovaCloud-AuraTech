<div class="min-h-screen bg-[#fafafa] flex flex-col font-display">
  <header class="bg-white h-16 border-b border-slate-200 flex items-center justify-between px-6 shrink-0 sticky top-0 z-50">

    <!-- Left: Logo + Nav -->
    <div class="flex items-center gap-8 h-full">
      <div class="flex items-center gap-2">
        <div class="bg-orange-500 text-white p-1 rounded-md flex items-center justify-center">
          <span class="material-symbols-outlined text-xl">cloud</span>
        </div>
        <span class="text-xl font-bold text-slate-900 tracking-tight">NovaCloud</span>
      </div>

     <nav class="hidden md:flex items-center h-full">
        <a
          routerLink="/admin/dashboard"
          routerLinkActive="text-orange-500 border-b-2 border-orange-500 font-bold"
          [routerLinkActiveOptions]="{ exact: true }"
          class="h-full flex items-center px-4 text-sm font-medium text-slate-500 hover:text-slate-900 transition-colors"
        >Dashboard</a>

        <a
          routerLink="/admin/users"
          routerLinkActive="text-orange-500 border-b-2 border-orange-500 font-bold"
          class="h-full flex items-center px-4 text-sm font-medium text-slate-500 hover:text-slate-900 transition-colors"
        >Usuarios</a>

      </nav>
    </div>

    <!-- Center: Search bar — only in Users section -->
    @if (isUsersSection()) {
      <div class="hidden lg:flex flex-1 max-w-sm mx-8">
        <div class="relative w-full">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg pointer-events-none">search</span>
          <input
            id="search-usuarios"
            type="text"
            placeholder="Buscar usuarios..."
            [value]="searchValue"
            (input)="onSearch($any($event.target).value)"
            class="w-full bg-slate-100 text-sm rounded-full pl-10 pr-4 py-2 font-medium text-slate-700 focus:outline-none focus:ring-2 focus:ring-orange-500/20 focus:bg-white transition-all duration-200"
          />
        </div>
      </div>
    }

    <!-- Right: Actions + Avatar -->
    <div class="flex items-center gap-4">
      <button class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors">
        <span class="material-symbols-outlined text-[18px]">notifications</span>
      </button>
      <button class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors">
        <span class="material-symbols-outlined text-[18px]">help</span>
      </button>
      <div class="h-8 w-px bg-slate-200 mx-2"></div>
      <div class="flex items-center gap-3">
        <div class="text-right hidden sm:block">
          <p class="text-sm font-bold text-slate-900 leading-none">Admin Principal</p>
          <p class="text-[10px] text-slate-500 mt-1 font-medium">ID: 04294</p>
        </div>
        <div class="w-10 h-10 rounded-full bg-orange-50 text-orange-600 border border-orange-200 flex items-center justify-center font-bold text-sm">
          AP
        </div>
      </div>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto">
    <router-outlet></router-outlet>
  </main>
</div>
