<div class="flex h-screen bg-gray-50 text-gray-900 font-sans">
  
  <app-sidebar class="hidden md:flex md:w-64 flex-col border-r border-gray-200 bg-white z-10"></app-sidebar>

  <div class="flex-1 flex flex-col overflow-hidden">
    
    <app-topbar class="h-16 bg-white border-b border-gray-200 flex items-center px-4 sm:px-6 z-10 shadow-sm"></app-topbar>

    <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
      <div class="max-w-7xl mx-auto">
        
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Mis Documentos</h1>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4">
          @for (file of mockFiles; track file.name) {
            <app-file-card [file]="file"></app-file-card>
          }
        </div>

      </div>
    </main>
  </div>
</div>
