<div class="p-8 h-full">

  <div class="flex items-center gap-2 mb-6 text-sm">
    <span class="text-slate-900 font-semibold flex items-center gap-1">
      <span class="material-symbols-outlined text-base">home</span>
      Inicio
    </span>
  </div>

  <section class="mb-10">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xl font-bold text-slate-900">Carpetas</h2>
      <button class="text-primary text-sm font-semibold hover:underline">Ver todas</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (folder of folders; track folder.name) {
        <div class="group bg-white p-6 rounded-xl border border-slate-200 hover:border-primary/50 hover:shadow-xl transition-all cursor-pointer">
          <div class="flex items-start justify-between mb-4">
            <div class="p-3 rounded-lg" [ngClass]="[folder.iconBgClass, folder.iconTextClass]">
              <span class="material-symbols-outlined text-3xl">{{ folder.icon }}</span>
            </div>
            <button class="text-slate-400 hover:text-slate-600">
              <span class="material-symbols-outlined">more_vert</span>
            </button>
          </div>
          <h3 class="font-bold text-slate-900 mb-1">{{ folder.name }}</h3>
          <p class="text-xs text-slate-500">{{ folder.fileCount }} archivos • {{ folder.totalSize }}</p>
          <div class="mt-4 flex -space-x-2">
            @for (avatar of folder.avatars; track avatar) {
              <div class="size-6 rounded-full border-2 border-white bg-slate-200 bg-cover bg-center"
                   [style.background-image]="'url(' + avatar + ')'"></div>
            }
            @if (folder.extraAvatars) {
              <div class="size-6 rounded-full border-2 border-white bg-slate-200 flex items-center justify-center text-[8px] font-bold text-slate-600">
                +{{ folder.extraAvatars }}
              </div>
            }
          </div>
        </div>
      }
    </div>
  </section>

  <app-file-list-view [files]="files"></app-file-list-view>

</div>
