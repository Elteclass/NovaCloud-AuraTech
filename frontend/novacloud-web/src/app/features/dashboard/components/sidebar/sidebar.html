<!-- Sidebar: NovaCloud Dashboard -->
<div class="flex flex-col h-full w-full bg-white text-slate-800">

  <!-- Action Buttons -->
  <div class="p-4 space-y-2">
    <a routerLink="/carga" class="w-full flex items-center justify-center gap-2 bg-primary text-white py-3 rounded-xl font-bold text-sm hover:shadow-lg hover:shadow-primary/30 transition-all cursor-pointer">
      <span class="material-symbols-outlined">add_circle</span>
      Subir Nuevo Archivo
    </a>
    <button (click)="openNewFolderModal()" class="w-full flex items-center justify-center gap-2 bg-slate-100 text-primary py-3 rounded-xl font-bold text-sm hover:bg-slate-200 transition-all">
  <span class="material-symbols-outlined">create_new_folder</span>
  Nueva Carpeta
</button>
  </div>

  <!-- Navigation Menu -->
  <nav class="flex-1 px-4 py-2 overflow-y-auto">
    <p class="px-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Principal</p>

    @for (item of navItems; track item.label) {
      <a [routerLink]="item.route"
         routerLinkActive="is-active"
         #rla="routerLinkActive"
         [class]="rla.isActive
           ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary/10 text-primary font-semibold mb-1'
           : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-100 transition-colors mb-1'">
        <span class="material-symbols-outlined">{{ item.icon }}</span>
        <span class="text-sm">{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- Storage Bar -->
  <div class="p-4">
    <div class="p-4 rounded-xl bg-slate-50 border border-slate-100">
      <div class="flex justify-between items-center mb-2">
        <span class="text-xs font-medium text-slate-500">Almacenamiento</span>
        <span class="text-xs font-bold text-primary">{{ storage.percentage }}%</span>
      </div>
      <div class="w-full bg-slate-200 h-1.5 rounded-full overflow-hidden">
        <div class="bg-primary h-full rounded-full transition-all" [style.width.%]="storage.percentage"></div>
      </div>
      <p class="text-[10px] text-slate-400 mt-2 text-center">
        {{ storage.usedGB }} GB de {{ storage.totalGB }} GB utilizados
      </p>
    </div>
  </div>
</div>
