<!-- Topbar: NovaCloud Dashboard -->
<div class="flex items-center justify-between w-full h-full px-6">

  <!-- Logo -->
  <div class="flex items-center gap-3 text-primary">
    <div class="size-8 flex items-center justify-center bg-primary rounded-lg text-white">
      <span class="material-symbols-outlined">cloud</span>
    </div>
    <h2 class="text-slate-900 text-xl font-bold leading-tight tracking-tight">NovaCloud</h2>
  </div>

  <!-- Search Bar -->
  <div class="flex flex-1 justify-center max-w-2xl px-8">
    <label class="flex flex-col w-full h-10">
      <div class="flex w-full flex-1 items-stretch rounded-lg bg-slate-100 border border-transparent focus-within:border-primary transition-all">
        <div class="text-slate-500 flex items-center justify-center pl-4">
          <span class="material-symbols-outlined text-xl">search</span>
        </div>
        <input
          class="flex w-full min-w-0 flex-1 border-none bg-transparent focus:ring-0 text-slate-900 placeholder:text-slate-500 text-sm font-normal outline-none px-3"
          placeholder="Buscar archivos, carpetas o documentos..."
          type="text">
      </div>
    </label>
  </div>

  <!-- Right Actions & Profile -->
  <div class="flex items-center gap-4">
    <!-- Notifications -->
    <button class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 text-slate-700 hover:bg-slate-200 transition-colors relative">
      <span class="material-symbols-outlined">notifications</span>
      @if (notificationCount > 0) {
        <span class="absolute -top-1 -right-1 flex h-4 w-4 items-center justify-center rounded-full bg-red-500 text-[9px] font-bold text-white">
          {{ notificationCount }}
        </span>
      }
    </button>

    <!-- Profile Chip -->
    <div class="flex items-center gap-3 pl-4 border-l border-slate-200">
      <div class="text-right hidden sm:block">
        <p class="text-sm font-bold leading-none">{{ user.fullName }}</p>
        <p class="text-xs text-slate-500 mt-1">{{ user.role }}</p>
      </div>
      <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10 border-2 border-primary/20"
           [style.background-image]="'url(' + user.avatarUrl + ')'">
      </div>
    </div>
  </div>
</div>
