<div class="p-8 h-full overflow-y-auto bg-background-light font-display">
  <div class="flex items-center gap-2 mb-6 text-sm">
    <span class="text-slate-900 font-semibold flex items-center gap-1">
      <span class="material-symbols-outlined text-base">delete</span>
      Papelera
    </span>
  </div>

  <section>
    <div class="mb-6 flex items-center justify-between">
      <div>
        <h2 class="text-2xl font-bold text-slate-900">Papelera</h2>
        <p class="text-slate-500 text-sm mt-1">Los elementos en la papelera se eliminarán definitivamente después de 30 días.</p>
      </div>
      <button class="px-4 py-2 text-sm font-semibold text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition-colors">
        Vaciar papelera
      </button>
    </div>

    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
      @for (file of trashedFiles; track file.name) {
        <div class="opacity-75 grayscale transition-all hover:grayscale-0 hover:opacity-100">
          <app-file-card [file]="file"></app-file-card>
        </div>
      }
    </div>
  </section>
</div>
