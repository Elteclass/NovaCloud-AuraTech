<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden bg-background-light font-display">
  <app-topbar class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 bg-white px-6 py-3 sticky top-0 z-50"></app-topbar>

  <div class="flex flex-1">
    <app-sidebar class="w-64 border-r border-slate-200 bg-white flex-col sticky top-[52px] h-[calc(100vh-52px)] overflow-y-auto hidden md:flex"></app-sidebar>

    <main class="flex-1 overflow-y-auto bg-background-light relative">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Global File Preview Modal -->
  <app-file-preview-modal 
    [file]="filePreviewService.selectedFile()" 
    (close)="filePreviewService.close()">
  </app-file-preview-modal>

  <!-- Global New Folder Modal -->
  <app-new-folder-modal></app-new-folder-modal>

  <!-- Global Context Menu -->
  <app-context-menu></app-context-menu>
  
</div>
