<div class="p-8 h-full overflow-y-auto bg-background-light font-display">
  <div class="flex items-center gap-2 mb-6 text-sm">
    <span class="text-slate-900 font-semibold flex items-center gap-1">
      <span class="material-symbols-outlined text-base">schedule</span>
      Recientes
    </span>
  </div>

  <section>
    <div class="mb-6">
      <h2 class="text-2xl font-bold text-slate-900">Abiertos recientemente</h2>
      <p class="text-slate-500 text-sm mt-1">Archivos que modificaste o visualizaste en los últimos 7 días.</p>
    </div>

    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
      @for (file of recentFiles; track file.name) {
        <app-file-card [file]="file"></app-file-card>
      }
    </div>
  </section>
</div>
