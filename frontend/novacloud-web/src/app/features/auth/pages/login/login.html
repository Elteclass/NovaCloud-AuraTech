<div class="min-h-screen bg-slate-50 flex flex-col justify-center items-center p-4">
  <div class="mb-8 text-center">
    <div class="flex items-center justify-center gap-2 mb-2">
      <svg
        class="w-10 h-10 text-brand-accent"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"
        ></path>
      </svg>
      <h1 class="text-4xl font-bold text-brand-primary tracking-tight">NovaCloud</h1>
    </div>
    <p class="text-sm text-slate-500 font-medium">By AuraTech Services</p>
  </div>

  <div class="bg-white w-full max-w-md rounded-xl shadow-lg p-8 border border-slate-100">
    <h2 class="text-2xl font-bold text-center text-brand-primary mb-6">Iniciar Sesión</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700 mb-1"
          >Correo electrónico corporativo</label
        >
        <div class="relative">
          <input
            type="email"
            id="email"
            formControlName="email"
            placeholder="ejemplo@auratech.com"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 outline-none transition-all"
            [ngClass]="{
              'border-red-500 focus:ring-red-500 focus:border-red-500 text-red-900':
                f['email'].invalid && (f['email'].dirty || f['email'].touched),
              'border-slate-300 focus:ring-brand-accent focus:border-brand-accent':
                !f['email'].invalid || (!f['email'].dirty && !f['email'].touched),
            }"
          />
        </div>
        <div
          *ngIf="f['email'].invalid && (f['email'].dirty || f['email'].touched)"
          class="mt-1 text-sm text-red-600 font-medium"
        >
          <span *ngIf="f['email'].errors?.['required']">El correo es obligatorio.</span>
          <span *ngIf="f['email'].errors?.['pattern']"
            >Debe ser un dominio válido de @auratech.com.</span
          >
        </div>
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 mb-1"
          >Contraseña</label
        >
        <div class="relative">
          <input
            type="password"
            id="password"
            formControlName="password"
            placeholder="••••••••"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 outline-none transition-all"
            [ngClass]="{
              'border-red-500 focus:ring-red-500 focus:border-red-500 text-red-900':
                f['password'].invalid && (f['password'].dirty || f['password'].touched),
              'border-slate-300 focus:ring-brand-accent focus:border-brand-accent':
                !f['password'].invalid || (!f['password'].dirty && !f['password'].touched),
            }"
          />
        </div>
        <div
          *ngIf="f['password'].invalid && (f['password'].dirty || f['password'].touched)"
          class="mt-1 text-sm text-red-600 font-medium"
        >
          <span *ngIf="f['password'].errors?.['required']">La contraseña es obligatoria.</span>
          <span *ngIf="f['password'].errors?.['minlength']">Mínimo 8 caracteres requeridos.</span>
        </div>
      </div>

      <div class="flex justify-end">
        <a
          href="#"
          class="text-sm text-brand-primary font-semibold hover:text-brand-accent transition-colors"
        >
          Recuperar contraseña
        </a>
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid || isLoading"
        class="w-full bg-brand-primary hover:bg-indigo-950 disabled:bg-slate-400 disabled:hover:bg-slate-400 disabled:cursor-not-allowed text-white font-bold py-3 rounded-lg transition-colors shadow-md mt-2"
      >
        <span *ngIf="!isLoading">Ingresar</span>
        <span *ngIf="isLoading">Autenticando...</span>
      </button>
    </form>
  </div>

  <div class="mt-10 text-center text-xs text-slate-400">
    <p>© 2026 AuraTech Services. Todos los derechos reservados.</p>
    <div class="mt-2 space-x-4">
      <a href="#" class="hover:text-slate-600 transition-colors">Soporte Técnico</a>
      <span>|</span>
      <a href="#" class="hover:text-slate-600 transition-colors">Privacidad</a>
    </div>
  </div>
</div>
