<!-- File Card Component -->
<div class="bg-white rounded-xl border border-slate-200 p-4 hover:shadow-md transition-shadow cursor-pointer group">
  <div class="aspect-square bg-slate-50 rounded-lg flex items-center justify-center mb-3 relative overflow-hidden">
    <span class="material-symbols-outlined text-5xl" [ngClass]="iconColorClass">{{ fileIcon }}</span>
    <div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
  </div>
  <p class="text-sm font-semibold truncate text-slate-900" [title]="file.name">{{ file.name }}</p>
  <p class="text-[10px] text-slate-500 mt-1">{{ file.timeAgo || (file.uploadDate | date:'mediumDate') }}</p>
</div>
