@if (modalService.isOpen()) {
  <div class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm transition-all">
    
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-200">
      
      <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
        <h3 class="text-lg font-bold text-slate-900">Nueva Carpeta</h3>
        <button (click)="close()" class="text-slate-400 hover:text-slate-600 transition-colors">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <div class="p-6">
        <input 
          type="text" 
          #folderInput 
          placeholder="Nombre de la carpeta" 
          (keyup.enter)="createFolder(folderInput.value)"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-primary focus:ring-4 focus:ring-primary/10 outline-none transition-all text-slate-700 font-medium">
      </div>

      <div class="px-6 py-4 bg-slate-50 flex justify-end gap-3 border-t border-slate-100">
        <button (click)="close()" class="px-5 py-2.5 rounded-xl font-bold text-slate-600 hover:bg-slate-200 transition-colors">
          Cancelar
        </button>
        <button (click)="createFolder(folderInput.value)" class="px-5 py-2.5 rounded-xl font-bold text-white bg-primary hover:bg-primary/90 transition-colors shadow-lg shadow-primary/30">
          Crear
        </button>
      </div>

    </div>
  </div>
}
